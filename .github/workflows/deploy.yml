name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH to VPS
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            # Masuk ke direktori aplikasi di VPS
            cd /var/www/yasmine-kost || exit
            
            # Ambil kode terbaru dari GitHub
            git pull origin main
            
            # Pasang dependensi
            npm install
            
            # Generate Prisma Client & Sync Database
            npx prisma generate
            npx prisma db push
            
            # Build Next.js aplikasi untuk produksi
            npm run build
            
            # Kelola proses PM2
            pm2 describe yasmine-kost > /dev/null 2>&1
            if [ $? -ne 0 ]; then
              # Jika proses PM2 belum ada, jalankan baru
              pm2 start npm --name "yasmine-kost" -- run start
            else
              # Jika sudah ada, muat ulang (zero-downtime reload)
              pm2 reload yasmine-kost
            fi
            
            # Simpan daftar proses PM2 agar otomatis jalan saat VPS restart
            pm2 save
